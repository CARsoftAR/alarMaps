name: alarmap
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  flutter_map: ^8.3.0
  flutter_background_service: ^5.1.0
  latlong2: ^0.9.1
  flutter_riverpod: ^2.5.1
  audioplayers: ^6.1.1
  vibration: ^3.0.0
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.5.5
  geocoding: ^3.0.0
  http: ^1.6.0
  flutter_map_cache: ^2.1.0
  path_provider: ^2.1.5
  dio: ^5.9.2
  google_maps_flutter: ^2.17.0
  flutter_system_ringtones: ^0.0.6
  flutter_ringtone_player: ^4.0.0+4
  permission_handler: ^11.3.1
  wakelock_plus: ^1.6.0

dependency_overrides:
  latlong2: 0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - assets/alarm 4.mp3
    - assets/splash.png
